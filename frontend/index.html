<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fabclaw AI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: #fff;
    background:
        radial-gradient(circle at top left, rgba(255, 31, 61, .25), transparent 35%),
        radial-gradient(circle at bottom right, rgba(124, 58, 237, .18), transparent 35%),
        linear-gradient(135deg, #050509, #090111, #000);
    display: flex;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(120deg, rgba(255, 31, 61, .12), rgba(124, 58, 237, .12), rgba(6, 182, 212, .08));
    filter: blur(70px);
    animation: aurora 10s ease-in-out infinite alternate;
    pointer-events: none;
}

@keyframes aurora {
    from { transform: translateY(0) scale(1); }
    to { transform: translateY(-35px) scale(1.08); }
}

#sidebar {
    width: 280px;
    z-index: 2;
    display: flex;
    flex-direction: column;
    padding: 18px 12px;
    background: rgba(255, 255, 255, .055);
    border-right: 1px solid rgba(255, 255, 255, .1);
    backdrop-filter: blur(22px);
}

#brand {
    text-align: center;
    padding: 10px 0 22px;
}

.logo {
    width: 86px;
    height: 86px;
    object-fit: cover;
    border-radius: 50%;
    animation: breathe 5s ease-in-out infinite;
    box-shadow:
        0 0 20px rgba(255, 31, 61, .9),
        0 0 55px rgba(255, 31, 61, .55),
        0 0 100px rgba(255, 31, 61, .25);
}

@keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
}

#brand h2 {
    margin: 12px 0 2px;
    font-size: 18px;
    letter-spacing: 1.5px;
}

#brand p {
    margin: 0;
    font-size: 12px;
    color: rgba(255,255,255,.65);
}

#newChat {
    margin: 6px 0 16px;
    padding: 13px;
    text-align: center;
    border-radius: 14px;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(90deg, #ff1f3d, #7c1023);
    box-shadow: 0 0 24px rgba(255,31,61,.35);
}

#sessions {
    overflow-y: auto;
    padding-bottom: 12px;
}

.session {
    padding: 11px 12px;
    margin-bottom: 8px;
    border-radius: 12px;
    cursor: pointer;
    background: rgba(255,255,255,.06);
    color: rgba(255,255,255,.85);
    font-size: 14px;
}

.session:hover,
.session.active {
    background: rgba(255,31,61,.22);
    transform: translateX(3px);
}

#chat {
    flex: 1;
    z-index: 2;
    display: flex;
    flex-direction: column;
    min-width: 0;
}

#messages {
    flex: 1;
    padding: 24px;
    padding-bottom: 260px;
    overflow-y: auto;
}

#welcome {
    text-align: center;
    margin-top: 12vh;
    opacity: .95;
}

.hero-core {
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 50%;
    animation: breathe 5s ease-in-out infinite;
    box-shadow:
        0 0 25px rgba(255,31,61,.9),
        0 0 80px rgba(255,31,61,.45);
}

#welcome h1 {
    margin: 18px 0 6px;
    font-size: 42px;
    letter-spacing: 2px;
}

#welcome p {
    color: rgba(255,255,255,.7);
}

.message {
    max-width: 76%;
    padding: 13px 15px;
    margin-bottom: 16px;
    line-height: 1.55;
    border-radius: 16px;
    word-wrap: break-word;
}

.user {
    margin-left: auto;
    background: linear-gradient(90deg, #ff1f3d, #b10024);
}

.ai {
    background: rgba(255,255,255,.075);
    border: 1px solid rgba(255,255,255,.13);
    backdrop-filter: blur(14px);
}

.ai p:first-child {
    margin-top: 0;
}

.ai p:last-child {
    margin-bottom: 0;
}

#inputBar {
    display: flex;
    gap: 10px;
    padding: 14px;
    background: rgba(255,255,255,.06);
    border-top: 1px solid rgba(255,255,255,.12);
    backdrop-filter: blur(16px);

    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 999;
}

#input {
    flex: 1;
    padding: 14px;
    border: none;
    outline: none;
    border-radius: 14px;
    color: white;
    background: rgba(255,255,255,.1);
}

#input::placeholder {
    color: rgba(255,255,255,.55);
}

button {
    border: none;
    border-radius: 14px;
    padding: 0 18px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(90deg, #ff1f3d, #7c1023);
}

button:disabled {
    opacity: .55;
    cursor: not-allowed;
}

::-webkit-scrollbar {
    width: 8px;
}

::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,.18);
    border-radius: 20px;
}

.message-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 10px;
}

.copy-btn {
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 10px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.14);
    color: rgba(255,255,255,.8);
    cursor: pointer;
}

.copy-btn:hover {
    background: rgba(255,31,61,.25);
}

pre {
    background: rgba(0,0,0,.45);
    padding: 14px;
    border-radius: 12px;
    overflow-x: auto;
}

code {
    font-family: monospace;
}

#orbLayer {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 1;
}

.orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(18px);
    opacity: .28;
    background: radial-gradient(circle, rgba(255,31,61,.85), rgba(124,16,35,.25), transparent 70%);
    animation: orbFloat 18s ease-in-out infinite, orbPulse 6s ease-in-out infinite;
}

.orb1 {
    width: 130px;
    height: 130px;
    top: 10%;
    left: 18%;
    animation-delay: 0s;
}

.orb2 {
    width: 90px;
    height: 90px;
    top: 28%;
    right: 12%;
    animation-delay: 2s;
}

.orb3 {
    width: 160px;
    height: 160px;
    bottom: 18%;
    left: 8%;
    animation-delay: 4s;
}

.orb4 {
    width: 70px;
    height: 70px;
    bottom: 12%;
    right: 22%;
    animation-delay: 1s;
}

.orb5 {
    width: 110px;
    height: 110px;
    top: 55%;
    left: 45%;
    animation-delay: 3s;
}

.orb6 {
    width: 55px;
    height: 55px;
    top: 15%;
    right: 38%;
    animation-delay: 5s;
}

@keyframes orbFloat {
    0% {
        transform: translate(0, 0) scale(1);
    }
    25% {
        transform: translate(35px, -45px) scale(1.08);
    }
    50% {
        transform: translate(-30px, -25px) scale(.96);
    }
    75% {
        transform: translate(20px, 35px) scale(1.04);
    }
    100% {
        transform: translate(0, 0) scale(1);
    }
}

@keyframes orbPulse {
    0%, 100% {
        opacity: .16;
    }
    50% {
        opacity: .36;
    }
    }
    
@media (max-width: 768px) {
    body {
        flex-direction: column;
    }

    #sidebar {
        width: 100%;
        height: auto;
        max-height: 180px;
        flex-shrink: 0;
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,.1);
    }
#chat {
    flex: 1;
    min-height: 0;
}
#messages {
    flex: 1;
    min-height: 0;
    padding: 16px;
    padding-bottom: 320px;
}

#inputBar {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 999;
}

#brand {
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
    padding: 4px 0 10px;
    }

    .logo {
        width: 58px;
        height: 58px;
    }

    #brand h2 {
        margin: 0;
    }

    #newChat {
        margin-bottom: 8px;
    }

    #sessions {
        display: flex;
        gap: 8px;
        overflow-x: auto;
    }

    .session {
        white-space: nowrap;
        min-width: fit-content;
    }


    .message {
        max-width: 92%;
    }
    
    .message:last-child {
    margin-bottom: 160px;
    }
  
    #welcome {
        margin-top: 6vh;
    }

    .hero-core {
        width: 110px;
        height: 110px;
    }

    #welcome h1 {
        font-size: 30px;
    }
}
</style>
</head>

<body>
<div id="orbLayer">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="orb orb4"></div>
    <div class="orb orb5"></div>
    <div class="orb orb6"></div>
</div>
<aside id="sidebar">
    <div id="brand">
        <img src="assets/Fabclaw-core.png" class="logo" alt="Fabclaw AI Core">
        <div>
            <h2>FABCLAW AI</h2>
            <p>Living AI Companion</p>
        </div>
    </div>

    <div id="newChat">＋ New Chat</div>
    <div id="sessions"></div>
</aside>

<main id="chat">
    <div id="messages">
        <div id="welcome">
            <img src="assets/Fabclaw-core.png" class="hero-core" alt="Fabclaw AI Core">
            <h1>FABCLAW AI</h1>
            <p>Ask anything. Build faster. Think sharper.</p>
        </div>
    </div>

    <div id="inputBar">
        <input id="input" placeholder="Ask Fabclaw AI..." autocomplete="off" />
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
</main>

<script>
const BASE_URL = "https://fabclaw-ai-1.onrender.com";
const user_id = "test123";

let currentSession = localStorage.getItem("fabclaw_current_session") || null;
let localSessions = JSON.parse(localStorage.getItem("fabclaw_sessions") || "[]");

function saveSessions() {
    localStorage.setItem("fabclaw_sessions", JSON.stringify(localSessions));
    if (currentSession) {
        localStorage.setItem("fabclaw_current_session", currentSession);
    }
}

function renderSessions() {
    const box = document.getElementById("sessions");
    box.innerHTML = "";

    localSessions.forEach(sessionId => {
        const div = document.createElement("div");
        div.className = "session" + (sessionId === currentSession ? " active" : "");
        div.innerText = sessionId;
        div.onclick = () => loadChat(sessionId);
        box.appendChild(div);
    });
}

async function newChat() {
    try {
        const res = await fetch(`${BASE_URL}/sessions/${user_id}`, {
            method: "POST"
        });

        const text = await res.text();

        let sessionId;
        try {
            const data = JSON.parse(text);
            sessionId = data.session_id || data.session || data.id || text;
        } catch {
            sessionId = text.replaceAll('"', "");
        }

        currentSession = sessionId || `session-${Date.now()}`;

        if (!localSessions.includes(currentSession)) {
            localSessions.unshift(currentSession);
        }

        saveSessions();
        renderSessions();
        clearMessages();

    } catch (err) {
        currentSession = `local-${Date.now()}`;
        localSessions.unshift(currentSession);
        saveSessions();
        renderSessions();
        clearMessages();
        render("ai", "Created a local session because the backend session endpoint did not respond.");
    }
}

document.getElementById("newChat").onclick = newChat;

function clearMessages() {
    document.getElementById("messages").innerHTML = "";
}

async function loadChat(sessionId) {
    currentSession = sessionId;
    saveSessions();
    renderSessions();
    clearMessages();

    try {
        const res = await fetch(`${BASE_URL}/history/${user_id}/${sessionId}`);
        const text = await res.text();

        let data;
        try {
            data = JSON.parse(text);
        } catch {
            data = text;
        }

        if (data && Array.isArray(data.history)) {
            data.history.forEach(m => render(m.role || "ai", m.content || ""));
        } else if (Array.isArray(data)) {
            data.forEach(m => render(m.role || "ai", m.content || String(m)));
        } else if (typeof data === "string" && data.trim()) {
            render("ai", data);
        } else {
            showWelcome();
        }

    } catch (err) {
        render("ai", "Could not load this chat history yet.");
    }
}

function showWelcome() {
    document.getElementById("messages").innerHTML = `
        <div id="welcome">
            <img src="assets/Fabclaw-core.png" class="hero-core" alt="Fabclaw AI Core">
            <h1>FABCLAW AI</h1>
            <p>Ask anything. Build faster. Think sharper.</p>
        </div>
    `;
}

function removeWelcome() {
    const welcome = document.getElementById("welcome");
    if (welcome) welcome.remove();
}

function render(role, text, options = {}) {
    removeWelcome();

    const box = document.getElementById("messages");
    const div = document.createElement("div");

    div.className = `message ${role === "user" ? "user" : "ai"}`;

    if (options.thinking) {
        div.innerHTML = `<em>Fabclaw is thinking...</em>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        return div;
    }

    if (role === "user") {
        div.textContent = text;
    } else {
        const content = document.createElement("div");
        content.className = "ai-content";
        content.innerHTML = marked.parse(text || "");

        const actions = document.createElement("div");
        actions.className = "message-actions";

        const copyBtn = document.createElement("button");
        copyBtn.className = "copy-btn";
        copyBtn.type = "button";
        copyBtn.innerText = "Copy";

        copyBtn.onclick = async () => {
            try {
                await navigator.clipboard.writeText(text || "");
                copyBtn.innerText = "Copied";
                setTimeout(() => copyBtn.innerText = "Copy", 1200);
            } catch {
                copyBtn.innerText = "Failed";
                setTimeout(() => copyBtn.innerText = "Copy", 1200);
            }
        };

        actions.appendChild(copyBtn);
        div.appendChild(content);
        div.appendChild(actions);
    }

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;

    return div;
}

async function sendMessage() {
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const message = input.value.trim();

    if (!message) return;

    if (!currentSession) {
        await newChat();
    }

    input.value = "";
    render("user", message);

    sendBtn.disabled = true;
    sendBtn.innerText = "Thinking...";

    const thinkingDiv = render("ai", "", { thinking: true });

    try {
        const res = await fetch(`${BASE_URL}/chat`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                user_id,
                session_id: currentSession,
                message
            })
        });

        const text = await res.text();

        let reply;
        try {
            const data = JSON.parse(text);
            reply = data.reply || data.response || data.message || data.content || text;
        } catch {
            reply = text.replace(/^"|"$/g, "");
        }

        thinkingDiv.remove();
        render("ai", reply || "No response received.");

    } catch (err) {
        thinkingDiv.remove();
        render("ai", "Connection error. Please check backend CORS or Render status.");
    } finally {
        sendBtn.disabled = false;
        sendBtn.innerText = "Send";
    }
    }

document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter") {
        sendMessage();
    }
});

renderSessions();

if (currentSession) {
    loadChat(currentSession);
} else {
    showWelcome();
}
</script>

</body>
</html>
```
