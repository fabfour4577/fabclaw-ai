<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fabclaw AI ✨</title> 

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> 

<style> 

/* =========================
   BASE THEME (GALAXY CORE)
========================= */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
    color: white; 

    background: radial-gradient(circle at top, #1a0b2e, #05010a, #000);
} 

/* animated aurora layer */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        120deg,
        rgba(124,58,237,0.15),
        rgba(6,182,212,0.1),
        rgba(255,0,128,0.08)
    );
    filter: blur(60px);
    animation: floatGlow 10s infinite alternate;
} 

@keyframes floatGlow {
    0% { transform: translateY(0px) scale(1); }
    100% { transform: translateY(-30px) scale(1.1); }
} 

/* =========================
   SIDEBAR
========================= */
#sidebar {
    width: 280px;
    display: flex;
    flex-direction: column; 

    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255,255,255,0.08); 

    z-index: 2;
} 

/* AI CORE LOGO */
#logoBox {
    padding: 20px;
    text-align: center;
} 

.logo {
    width: 70px;
    height: 70px;
    border-radius: 20px; 

    box-shadow:
        0 0 25px rgba(140,90,255,0.8),
        0 0 60px rgba(0,200,255,0.25); 

    transition: 0.4s ease;
} 

.logo:hover {
    transform: scale(1.08) rotate(3deg);
} 

/* NEW CHAT BUTTON */
#newChat {
    margin: 12px;
    padding: 12px;
    text-align: center;
    font-weight: bold; 

    background: linear-gradient(90deg, #7c3aed, #06b6d4);
    border-radius: 12px;
    cursor: pointer; 

    box-shadow: 0 0 18px rgba(124,58,237,0.4);
} 

/* SESSIONS */
.session {
    margin: 6px 10px;
    padding: 10px;
    border-radius: 10px; 

    background: rgba(255,255,255,0.05);
    cursor: pointer; 

    transition: 0.2s;
} 

.session:hover {
    background: rgba(255,255,255,0.12);
    transform: translateX(4px);
} 

/* =========================
   CHAT AREA
========================= */
#chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    z-index: 2;
} 

#messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
} 

/* USER */
.user {
    margin-left: auto;
    max-width: 70%;
    padding: 12px;
    border-radius: 14px; 

    background: linear-gradient(90deg, #3b82f6, #06b6d4);
} 

/* AI */
.ai {
    max-width: 70%;
    padding: 12px;
    border-radius: 14px; 

    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12); 

    backdrop-filter: blur(10px);
} 

/* =========================
   INPUT
========================= */
#inputBar {
    display: flex;
    padding: 12px; 

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px); 

    border-top: 1px solid rgba(255,255,255,0.1);
} 

#input {
    flex: 1;
    padding: 12px; 

    border-radius: 12px;
    border: none;
    outline: none; 

    background: rgba(255,255,255,0.08);
    color: white;
} 

button {
    margin-left: 10px;
    padding: 12px 16px; 

    background: linear-gradient(90deg, #7c3aed, #06b6d4);
    border: none; 

    color: white;
    border-radius: 12px; 

    cursor: pointer;
} 

</style>
</head> 

<body> 

<!-- SIDEBAR -->
<div id="sidebar"> 

    <div id="logoBox">
        <img src="fabclaw.png" class="logo">
    </div> 

    <div id="newChat">➕ New Chat</div>
    <div id="sessions"></div>
</div> 

<!-- CHAT -->
<div id="chat"> 

    <div id="messages"></div> 

    <div id="inputBar">
        <input id="input" placeholder="Ask Fabclaw AI..." />
        <button onclick="sendMessage()">Send</button>
    </div> 

</div> 

<script> 

const BASE_URL = "https://fabclaw-ai-1.onrender.com";
const user_id = "test123"; 

let currentSession = null; 

/* LOAD SESSIONS */
async function loadSessions() {
    const res = await fetch(`${BASE_URL}/sessions/${user_id}`);
    const data = await res.json(); 

    const box = document.getElementById("sessions");
    box.innerHTML = ""; 

    data.sessions.forEach(s => {
        const div = document.createElement("div");
        div.className = "session";
        div.innerText = s;
        div.onclick = () => loadChat(s);
        box.appendChild(div);
    });
} 

/* NEW CHAT */
async function newChat() {
    const res = await fetch(`${BASE_URL}/sessions/${user_id}`, {
        method: "POST"
    }); 

    const data = await res.json(); 

    currentSession = data.session_id; 

    loadSessions();
    loadChat(currentSession);
} 

document.getElementById("newChat").onclick = newChat; 

/* LOAD CHAT */
async function loadChat(sessionId) {
    currentSession = sessionId; 

    const res = await fetch(`${BASE_URL}/history/${user_id}/${sessionId}`);
    const data = await res.json(); 

    const box = document.getElementById("messages");
    box.innerHTML = ""; 

    data.history.forEach(m => {
        render(m.role, m.content);
    });
} 

/* RENDER */
function render(role, text) {
    const box = document.getElementById("messages"); 

    const div = document.createElement("div");
    div.className = role; 

    div.innerHTML = role === "ai"
        ? marked.parse(text)
        : text; 

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
} 

/* SEND MESSAGE (STREAM) */
async function sendMessage() { 

    const input = document.getElementById("input");
    const text = input.value;
    if (!text.trim()) return; 

    input.value = ""; 

    if (!currentSession) await newChat(); 

    render("user", text); 

    const box = document.getElementById("messages"); 

    const aiDiv = document.createElement("div");
    aiDiv.className = "ai";
    aiDiv.innerText = "";
    box.appendChild(aiDiv); 

    const res = await fetch(`${BASE_URL}/chat-stream`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            user_id,
            session_id: currentSession,
            message: text
        })
    }); 

    const reader = res.body.getReader();
    const decoder = new TextDecoder(); 

    let fullText = ""; 

    while (true) {
        const { value, done } = await reader.read();
        if (done) break; 

        const chunk = decoder.decode(value);
        const lines = chunk.split("\n"); 

        for (let line of lines) {
            if (line.startsWith("data: ")) { 

                const token = line.replace("data: ", "");
                if (token === "[DONE]") return; 

                fullText += token;
                aiDiv.innerHTML = marked.parse(fullText); 

                box.scrollTop = box.scrollHeight;
            }
        }
    }
} 

loadSessions(); 

</script> 

</body>
  </html>
